services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  AgencyPowerstack\ContaoBlogSyncBundle\:
    resource: '../src/'
    exclude:
      - '../src/ContaoManager/'
      - '../src/Resources/'
      - '../src/DependencyInjection/'

  AgencyPowerstack\ContaoBlogSyncBundle\Service\BlogImporter:
    arguments:
      $logger: '@monolog.logger'
      $kernel: '@kernel'
      $connection: '@doctrine.dbal.default_connection'

  AgencyPowerstack\ContaoBlogSyncBundle\Service\SyncLogger:
    arguments:
      $connection: '@doctrine.dbal.default_connection'

  AgencyPowerstack\ContaoBlogSyncBundle\Controller\ConnectCallbackController:
    tags:
      - { name: 'controller.service_arguments' }

  AgencyPowerstack\ContaoBlogSyncBundle\Controller\Api\BlogPushController:
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $blogImporter: '@AgencyPowerstack\ContaoBlogSyncBundle\Service\BlogImporter'
      $syncLogger: '@AgencyPowerstack\ContaoBlogSyncBundle\Service\SyncLogger'
      $framework: '@contao.framework'
      $logger: '@monolog.logger'
    tags:
      - { name: 'controller.service_arguments' }

  AgencyPowerstack\ContaoBlogSyncBundle\Controller\DisconnectController:
    tags:
      - { name: 'controller.service_arguments' }

  AgencyPowerstack\ContaoBlogSyncBundle\EventListener\AccountDeleteListener:
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $logger: '@monolog.logger'
      $params: '@parameter_bag'
