services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false
    # Bind the frontend URL parameter to any service with a $frontendUrl constructor argument
    bind:
      string $frontendUrl: '%blog_sync.frontend_url%'

  # Register all classes in src/ as services (excludes ContaoManager and DI extension)
  AgencyPowerstack\ContaoBlogSyncBundle\:
    resource: '../src/'
    exclude:
      - '../src/ContaoManager/'
      - '../src/Resources/'
      - '../src/DependencyInjection/'

  # AccountDeleteListener must be public so Contao can resolve the DCA callback
  AgencyPowerstack\ContaoBlogSyncBundle\EventListener\AccountDeleteListener:
    public: true

  # Controllers need the service_arguments tag for Symfony's controller argument resolving
  AgencyPowerstack\ContaoBlogSyncBundle\Controller\ConnectCallbackController:
    tags:
      - { name: 'controller.service_arguments' }

  AgencyPowerstack\ContaoBlogSyncBundle\Controller\Api\BlogPushController:
    tags:
      - { name: 'controller.service_arguments' }

  AgencyPowerstack\ContaoBlogSyncBundle\Controller\DisconnectController:
    tags:
      - { name: 'controller.service_arguments' }
